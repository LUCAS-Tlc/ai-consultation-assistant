<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 — AI 咨询助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .success-box {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 48px 32px;
            text-align: center;
            max-width: 520px;
            margin: 0 auto;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #E8F5E9;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .success-box h1 {
            color: #2E7D32;
            margin-bottom: 12px;
        }
        .success-box p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        .success-box .btn-primary {
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">AI 咨询助手</a>
            <div class="nav-links">
                <a href="/">提交咨询</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="success-box">
            <div class="success-icon">&#10003;</div>
            <h1>提交成功</h1>
            <p>感谢您的咨询，我们已收到您的信息。<br>团队将在 1-2 个工作日内与您联系。</p>
            <a href="/" class="btn-primary">提交新咨询</a>
        </div>
        <p class="admin-link"><a href="/dashboard">内部管理</a></p>
    </main>
</body>
</html>
